name: HiveBox CI

on:
  push:
    branches:
      - "main"
      - "phase-*"      
      - "feat-*"     
      - "fix-*"
  pull_request:
    branches:
      - "main"
      - "phase-*"

jobs:
  # Job 1: Check Quality (Python & Dockerfile)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint flask requests prometheus-flask-exporter
          
      - name: Lint Python Code
        run: pylint app.py
        
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # Job 2: Run Unit Tests
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests-mock
          
      - name: Run Unit Tests
        run: pytest

  # Job 3: Security Scan (Infrastructure as Code)
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy Vulnerability Scanner (K8s)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: './k8s'
          exit-code: '1' # Fail pipeline if CRITICAL/HIGH issues found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # Job 4: Build & Integration Test
  build:
    needs: [lint, test, security_scan] # Must wait for Security Scan too!
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker Image
        run: docker build -t hivebox:${{ github.sha }} .
        
      - name: Run Container
        run: docker run -d -p 5000:5000 --name hivebox-ci hivebox:${{ github.sha }}
        
      - name: Wait for App to Start
        run: sleep 5
        
      - name: Test Endpoint (Integration)
        run: |
          response=$(curl -s http://localhost:5000/version)
          echo "Response: $response"
          if [[ "$response" != *'"version":"v0.0.1"'* ]]; then
            echo "Integration Test Failed!"
            exit 1
          fi
          echo "Integration Test Passed!"