apiVersion: apps/v1
kind: Deployment
metadata:
  name: hivebox-deployment
  labels:
    app: hivebox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hivebox
  template:
    metadata:
      labels:
        app: hivebox
    spec:
      # --- Security Fix 1: AppUser ---
      # Ensure the pod runs as the user we created in Dockerfile (1000)
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 2000
        runAsNonRoot: true

      containers:
      - name: hivebox
        image: hivebox:v0.0.1
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
        
        # --- Security Fix 2: ReadOnly FS & Capabilities ---
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

        readinessProbe:
          httpGet:
            path: /version
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /version
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 15
          
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
            
        env:
        - name: SENSEBOX_IDS
          value: "5eba5fbad46fb8001b799786,5c21ff8f919bf8001adf2488,5ade1acf223bd80019a1011c"